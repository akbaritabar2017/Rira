syntax = "proto3";

option csharp_namespace = "Rira.Akbaritabar.Test.Server";

import "google/protobuf/timestamp.proto";

package person;

service PersonService {
  rpc CreatePerson (CreatePersonRequest) returns (PersonReply);
  rpc GetPerson (PersonByIdRequest) returns (PersonReply);
  rpc GetAllPersons (Empty) returns (PersonsReply);
  rpc UpdatePerson (UpdatePersonRequest) returns (PersonReply);
  rpc DeletePerson (PersonByIdRequest) returns (DeleteReply);
}

message Empty {}

message PersonByIdRequest {
  int32 id = 1;
}

message CreatePersonRequest {
  string name = 1;
  string family = 2;
  string nationalCode = 3;
  google.protobuf.Timestamp birthDate = 4;
}

message UpdatePersonRequest {
  int32 id = 1;
  string name = 2;
  string family = 3;
  string nationalCode = 4;
  google.protobuf.Timestamp birthDate = 5;
}

message PersonReply {
  int32 id = 1;
  string name = 2;
  string family = 3;
  string nationalCode = 4;
  google.protobuf.Timestamp birthDate = 5;
}

message PersonsReply {
  repeated PersonReply persons = 1;
}

message DeleteReply {
  bool success = 1;
}
